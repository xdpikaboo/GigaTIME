name: gigatime_check_1

channels:
  - conda-forge

dependencies:
  - python=3.11
  - openslide  # C library for openslide-python (conda-forge)

  - pip

  - pip:
      # Core scientific stack

      - numpy~=2.2

      - pandas~=2.3

      - scipy~=1.16

      - scikit-learn~=1.5

      - scikit-image~=0.25

      - matplotlib~=3.9

      - imageio~=2.34

      - opencv-python-headless~=4.10

      - pillow~=10.4

      - pyyaml~=6.0

      - openslide-python

      - requests~=2.32

      - tqdm~=4.66

      - anyio~=4.4

      - tzdata~=2025.1

      - networkx~=3.3

      # Jupyter

      - jupyterlab~=4.2

      - ipykernel~=6.29

      - ipywidgets~=8.1

      # CV / augmentations

      - albucore~=0.0

      - albumentations~=1.4

      - qudida~=0.0.4

      - easydict~=1.13

      - edict~=0.51

      # Performance helpers

      - simsimd~=6.5

      - stringzilla~=4.0

      - typing-inspection~=0.4

      # PyTorch with CUDA (Windows/Linux + NVIDIA GPU)
      # Requires compatible NVIDIA driver. For CPU-only, replace with: torch~=2.4, torchvision~=0.19
      - --extra-index-url https://download.pytorch.org/whl/cu124
      - torch
      - torchvision
